<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ARTMENXXX">
  <!-- фон-плашка -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#16202b"/>

  <!-- корпус монитора -->
  <rect x="8" y="11" width="48" height="38" rx="4" fill="#d8d2ad"/>
  <rect x="8" y="11" width="48" height="38" rx="4" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="1"/>

  <!-- чёрная рамка экрана -->
  <rect x="12.5" y="15" width="39" height="25" rx="2.5" fill="#0c0f0d"/>
  <!-- зелёный экран -->
  <rect x="15" y="17.5" width="34" height="20" rx="1.5" fill="#3fae4a"/>
  <rect x="15" y="17.5" width="34" height="20" rx="1.5" fill="url(#scan)"/>

  <!-- инструменты крест-накрест -->
  <g transform="translate(0,3.5)">
  <!-- молоток (голова вверх-влево) -->
  <g transform="rotate(-42 32 28)">
    <rect x="30" y="20.5" width="4" height="17" rx="1.4" fill="#8a5a2b"/>
    <rect x="30" y="20.5" width="4" height="17" rx="1.4" fill="#000" fill-opacity="0.12"/>
    <rect x="30.4" y="20.8" width="1.4" height="16.4" rx="0.7" fill="#a06a34"/>
    <rect x="24.5" y="15.4" width="14" height="6.4" rx="1.4" fill="#a3aab1"/>
    <rect x="24.5" y="15.4" width="14" height="2.4" rx="1.2" fill="#c2c8cd"/>
  </g>
  <!-- кисть (радужный ворс вверх-вправо) -->
  <g transform="rotate(42 32 28)">
    <rect x="30" y="21.6" width="4" height="16" rx="1.4" fill="#8a5a2b"/>
    <rect x="30.4" y="21.8" width="1.4" height="15.6" rx="0.7" fill="#a06a34"/>
    <rect x="28.7" y="19" width="6.6" height="3.4" rx="0.8" fill="#a3aab1"/>
    <rect x="28.7" y="19" width="6.6" height="1.4" rx="0.7" fill="#c2c8cd"/>
    <g>
      <rect x="28.7" y="13.2" width="1.35" height="6.2" fill="#e23b3b"/>
      <rect x="30.05" y="13.2" width="1.35" height="6.2" fill="#f0922f"/>
      <rect x="31.4" y="13.2" width="1.3" height="6.2" fill="#f4d23a"/>
      <rect x="32.7" y="13.2" width="1.3" height="6.2" fill="#6fe05c"/>
      <rect x="34.0" y="13.2" width="1.3" height="6.2" fill="#7b54c4"/>
    </g>
    <!-- контур ворса, чтобы отделить от экрана -->
    <rect x="28.5" y="13" width="7" height="6.6" rx="0.6" fill="none" stroke="#16202b" stroke-width="0.8"/>
  </g>
  </g>

  <!-- индикаторы на корпусе -->
  <rect x="14" y="43" width="3" height="3" rx="0.8" fill="#e23b3b"/>
  <rect x="19" y="43" width="3" height="3" rx="0.8" fill="#3fae4a"/>
  <rect x="24" y="43" width="3" height="3" rx="0.8" fill="#3fae4a"/>
  <rect x="44" y="43" width="7" height="3" rx="0.8" fill="#bcb691"/>

  <defs>
    <pattern id="scan" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="none"/>
      <circle cx="0.6" cy="0.6" r="0.35" fill="#000" fill-opacity="0.08"/>
    </pattern>
  </defs>
</svg>
